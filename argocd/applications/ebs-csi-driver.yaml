apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:

  name: ebs-csi-driver

  namespace: argocd


spec:

  project: platform


  sources:

    - repoURL: https://kubernetes-sigs.github.io/aws-ebs-csi-driver

      chart: aws-ebs-csi-driver

      targetRevision: 2.40.0


      helm:

        valueFiles:

          - $values/addons/ebs-csi-driver/values.yaml



    - repoURL: https://github.com/AjayThakur2/eks-platform-gitops.git

      targetRevision: main

      ref: values



  destination:

    server: https://kubernetes.default.svc

    namespace: kube-system



  syncPolicy:

    automated:

      prune: true

      selfHeal: true


    syncOptions:

      - CreateNamespace=true
