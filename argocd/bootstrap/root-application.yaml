apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: platform-bootstrap
  namespace: argocd

spec:

  project: default

  source:
    repoURL: https://github.com/AjayThakur2/eks-platform-gitops.git
    targetRevision: main
    path: argocd/applications

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:

    automated:
      prune: true
      selfHeal: true
